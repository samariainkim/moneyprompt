<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>돈 버는 프롬프트 — AI로 부자되기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e5e7eb;
    --border-light: #f3f4f6;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --accent: #d97706;
    --accent-light: #fef3c7;
    --code-bg: #1c1917;
    --code-text: #f3f4f6;
    --tag-bg: #f3f4f6;
    --tag-text: #374151;
    --success: #16a34a;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* 헤더 */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .buy-btn {
    font-size: 12px;
    padding: 7px 16px;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: -0.2px;
  }
  .buy-btn:hover { background: #b45309; }

  /* 히어로 */
  .hero {
    max-width: 900px;
    margin: 0 auto;
    padding: 56px 24px 40px;
    border-bottom: 1px solid var(--border);
  }
  .hero-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .hero-title {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .hero-title span { color: var(--accent); }
  .hero-sub {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .hero-stats {
    display: flex;
    gap: 32px;
  }
  .stat-item { }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--text-primary); letter-spacing: -1px; display: block; }
  .stat-label { font-size: 12px; color: var(--text-muted); }

  /* 필터 & 검색 */
  .controls {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 24px 0;
  }
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .search-wrap input {
    width: 100%;
    padding: 11px 16px 11px 42px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    background: var(--surface);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }
  .filter-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    flex-wrap: wrap;
  }
  .ftab {
    flex: 1;
    min-width: 80px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 6px;
    cursor: pointer;
    color: var(--text-secondary);
    border-right: 1px solid var(--border);
    transition: all 0.15s;
    user-select: none;
    white-space: nowrap;
  }
  .ftab:last-child { border-right: none; }
  .ftab.on { background: #111827; color: #fff; }
  .ftab:hover:not(.on) { background: var(--border-light); }

  /* 프롬프트 목록 */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 28px 0 10px;
    border-bottom: 1px solid var(--border);
  }
  .prompt-row {
    border-bottom: 1px solid var(--border-light);
    overflow: hidden;
  }
  .prompt-row.hidden { display: none; }
  .row-head {
    display: flex;
    align-items: center;
    padding: 16px 0;
    cursor: pointer;
    gap: 14px;
    transition: background 0.1s;
  }
  .row-head:hover .row-title { color: var(--accent); }
  .row-idx {
    font-size: 10px;
    color: var(--text-muted);
    min-width: 44px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
  }
  .row-title {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    transition: color 0.15s;
    line-height: 1.4;
  }
  .row-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .tag.ai { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
  .row-arrow {
    font-size: 13px;
    color: var(--text-muted);
    transition: transform 0.2s;
    margin-left: 4px;
  }
  .prompt-row.open .row-arrow { transform: rotate(90deg); }
  .row-body { display: none; padding-bottom: 20px; }
  .prompt-row.open .row-body { display: block; }
  .row-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 12px;
    padding-left: 58px;
    line-height: 1.7;
  }
  .prompt-box { margin-left: 58px; }
  .prompt-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .prompt-code {
    background: var(--code-bg);
    color: var(--code-text);
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 12.5px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 360px;
    overflow-y: auto;
  }
  .prompt-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .copy-btn {
    font-size: 12px;
    padding: 8px 18px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: #111827; color: #fff; border-color: #111827; }
  .copy-ok {
    font-size: 12px;
    color: var(--success);
    display: none;
    align-items: center;
    gap: 5px;
    font-weight: 500;
  }

  /* 푸터 */
  footer {
    background: #111827;
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 32px 24px;
    font-size: 12px;
    line-height: 1.8;
  }
  footer a { color: rgba(255,255,255,0.7); text-decoration: none; }
  footer a:hover { color: #fff; }

  /* 빈 결과 */
  .empty { text-align: center; padding: 60px 0; color: var(--text-muted); font-size: 14px; display: none; }

  /* 반응형 */
  @media (max-width: 600px) {
    .hero-title { font-size: 36px; }
    .hero-stats { gap: 20px; }
    .ftab { font-size: 11px; padding: 8px 4px; }
    .row-right { display: none; }
    .row-desc, .prompt-box { padding-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">돈 버는 <span>프롬프트</span></div>
    <a class="buy-btn" href="#" target="_blank">책 구매하기 →</a>
  </div>
</header>

<section class="hero">
  <div class="hero-label">『AI로 부자되기』 프롬프트 라이브러리</div>
  <h1 class="hero-title">돈 버는<br><span>프롬프트</span></h1>
  <p class="hero-sub">AI에게 올바른 질문을 던지면 돈이 보입니다.<br>필요한 프롬프트를 골라 바로 복사해서 쓰세요.</p>
  <div class="hero-stats">
    <div class="stat-item"><span class="stat-num">80</span><span class="stat-label">총 프롬프트</span></div>
    <div class="stat-item"><span class="stat-num">7</span><span class="stat-label">카테고리</span></div>
    <div class="stat-item"><span class="stat-num">5</span><span class="stat-label">AI 툴</span></div>
  </div>
</section>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="프롬프트 검색... (예: 연말정산, ETF, 청약, 재무제표)">
  </div>
  <div class="filter-tabs" id="filterTabs">
    <div class="ftab on" data-cat="전체">전체</div>
    <div class="ftab" data-cat="재무진단">재무진단</div>
    <div class="ftab" data-cat="지출·저축">지출·저축</div>
    <div class="ftab" data-cat="AI투자팀">AI투자팀</div>
    <div class="ftab" data-cat="주식투자">주식투자</div>
    <div class="ftab" data-cat="부동산">부동산</div>
    <div class="ftab" data-cat="절세전략">절세전략</div>
    <div class="ftab" data-cat="재테크루틴">재테크루틴</div>
  </div>
</div>

<main class="main" id="mainList"></main>
<div class="empty" id="emptyMsg">검색 결과가 없습니다. 다른 키워드로 검색해보세요.</div>

<footer>
  <p>『AI로 부자되기』 | 저자 김태형(사마리아인)<br>
  <a href="https://samariain.com" target="_blank">samariain.com</a> &nbsp;·&nbsp;
  <a href="https://youtube.com" target="_blank">사마리아인TV</a></p>
  <p style="margin-top:8px;">© 2025 김태형. 이 페이지의 프롬프트는 개인 학습 목적으로만 활용하세요.</p>
</footer>

<script>
const PROMPTS = [
  // ── CAT-01 재무진단·목표설정 ──────────────────────────
  { idx:"01/01", cat:"재무진단", ai:"ChatGPT", title:"상황별 맞춤 재테크 로드맵",
    desc:"나이·소득·상황에 맞는 재테크 출발점을 찾아줍니다. 사회초년생부터 은퇴 준비자까지 내 상황을 입력하면 단계별 로드맵을 설계해줍니다.",
    prompt:`[2030 사회초년생]
"나는 올해 입사한 28살 직장인이야. 월 실수령액은 230만 원이고 부모님 집에서 살고 있어서 고정 지출은 크지 않아. 재테크를 시작하고 싶은데 뭐부터 해야 할지 전혀 모르겠어. 비상금 마련부터 첫 투자까지, 사회초년생이 지금 당장 실천할 수 있는 재테크 로드맵을 단계별로 짜줘."

[2030 신혼부부]
"나는 결혼 1년 차 33살 직장인이야. 맞벌이로 남편과 합산 월 실수령액이 550만 원인데, 전세 대출 이자와 생활비를 내고 나면 매달 100만 원 남짓밖에 못 모아. 신혼부부가 5년 안에 내 집 마련 종잣돈 1억 원을 모으려면 어떤 저축·투자 전략을 써야 하는지 구체적으로 알려줘."

[3040 맞벌이 부부]
"나는 40살 맞벌이 직장인이야. 부부 합산 월 소득은 800만 원인데 대출 이자, 아이 교육비, 생활비를 빼면 저축 여력이 월 150만 원 정도야. 현재 아파트 담보대출 2억 원이 있고 주식 계좌에 3,000만 원이 있어. 앞으로 10년간 노후 준비와 자녀 교육비를 동시에 해결할 수 있는 자산 배분 전략을 알려줘."

[4050 은퇴 준비]
"나는 52살 직장인이야. 은퇴까지 약 8년 남았고 현재 국민연금 외에 별도의 노후 준비가 거의 없어. 퇴직금은 약 1억 5천만 원이 예상되고 매달 200만 원씩 추가 저축이 가능해. IRP, 연금저축, 배당주 투자 등을 활용해서 월 300만 원 이상의 노후 소득을 만들 수 있는 현실적인 플랜을 짜줘."`
  },
  { idx:"01/02", cat:"재무진단", ai:"Claude", title:"나의 재무 현황 분석",
    desc:"현재 수입·지출·자산·부채를 입력하면 재무 문제점과 개선 방향을 분석해줍니다.",
    prompt:`"내 현재 재무 상황을 알려줄게. 분석해서 문제점과 개선 방향을 알려줘.

나이 및 가족 상황 : 32살, 미혼, 1인 가구
월 실수령액 : 320만 원
월 고정 지출 : 월세 55만 원, 통신비 7만 원, 보험료 12만 원, 구독 서비스 3만 원
월 변동 지출 : 식비 35만 원, 교통비 10만 원, 쇼핑·여가 30만 원
보유 자산 : 예금 800만 원, 주식 200만 원
부채 : 없음
현재 월 저축액 : 50만 원

현재 저축률이 적정한지, 지출 구조에서 개선할 부분은 없는지, 앞으로 어떤 방향으로 자산을 늘려가면 좋을지 구체적으로 알려줘."`
  },
  { idx:"01/03", cat:"재무진단", ai:"ChatGPT", title:"재무 목표 설정하기",
    desc:"막연한 목표를 SMART 원칙에 맞는 단기·중기·장기 목표로 구체화해줍니다.",
    prompt:`"나는 33살 직장인이야. 월 실수령액은 300만 원이고 현재 모아둔 돈은 1,500만 원이야. 막연하게 '집을 사고 싶다', '노후가 걱정된다', '여행 자금을 모으고 싶다'는 생각은 있는데 어떻게 목표를 세워야 할지 모르겠어. 내 상황에 맞는 단기(1~2년), 중기(3~5년), 장기(10년 이상) 재테크 목표를 SMART 원칙에 맞게 각각 하나씩 만들어줘."`
  },
  { idx:"01/04", cat:"재무진단", ai:"ChatGPT", title:"목표를 월 단위 숫자로 쪼개기",
    desc:"큰 목표를 월 단위 실천 숫자로 쪼개고 달성 가능성을 계산해줍니다.",
    prompt:`"나는 3년 후까지 결혼 자금 3,000만 원을 모으는 게 목표야. 현재 모아둔 돈은 500만 원이고 매달 저축 가능한 금액은 최대 70만 원이야.

1. 목표 달성이 가능한지 계산해주고,
2. 만약 부족하다면 어떤 저축 상품이나 투자 방법을 활용하면 좋을지 구체적으로 알려줘.
3. 이자나 수익률도 현실적인 수준으로 반영해줘."`
  },
  { idx:"01/05", cat:"재무진단", ai:"ChatGPT", title:"마일스톤 만들기",
    desc:"장기 목표를 6개월 단위 마일스톤으로 쪼개고 시점별 액션 플랜을 세워줍니다.",
    prompt:`"3년 안에 결혼 자금 3,000만 원을 모으는 목표를 세웠어. 현재 500만 원이 있고 매달 70만 원씩 저축할 계획이야.

1. 이 목표를 6개월 단위 마일스톤으로 쪼개줘.
2. 각 마일스톤마다 달성해야 할 목표 금액, 점검해야 할 항목, 그 시점에 고려해야 할 재테크 액션도 함께 알려줘."`
  },

  // ── CAT-02 지출·저축관리 ─────────────────────────────
  { idx:"02/01", cat:"지출·저축", ai:"ChatGPT", title:"맞춤형 월 예산 플랜 만들기",
    desc:"지난달 지출 내역을 분석해서 이번 달 현실적인 예산 플랜을 짜줍니다.",
    prompt:`"내 지난달 지출 내역을 분석해서 이번 달 현실적인 월 예산 플랜을 짜줘.

월 실수령액 : 320만 원
고정 지출 : 월세 55만 원, 통신비 8만 원, 보험료 12만 원, 구독 서비스 3만 원
변동 지출 : 식비(외식·배달 포함) 62만 원, 교통비 12만 원, 쇼핑 35만 원, 여가 18만 원, 기타 10만 원
현재 월 저축액 : 적금 30만 원 + ETF 20만 원
재테크 목표 : 3년 안에 결혼 자금 3,000만 원 마련

1. 목표 달성을 위해 저축액을 최대한 늘리고 싶어.

// ── 렌더링 ──────────────────────────────────────────────
const catColors = {
  "재무진단":"#3b82f6","지출·저축":"#10b981","AI투자팀":"#8b5cf6",
  "주식투자":"#ef4444","부동산":"#f59e0b","절세전략":"#6366f1","재테크루틴":"#14b8a6"
};
const catSections = ["재무진단","지출·저축","AI투자팀","주식투자","부동산","절세전략","재테크루틴"];
const catLabels = {
  "재무진단":"CAT-01 · 재무진단·목표설정",
  "지출·저축":"CAT-02 · 지출·저축관리",
  "AI투자팀":"CAT-03 · AI투자팀 구성",
  "주식투자":"CAT-04 · 주식투자",
  "부동산":"CAT-05 · 부동산투자",
  "절세전략":"CAT-06 · 절세전략",
  "재테크루틴":"CAT-07 · 재테크루틴"
};

let currentCat = "전체";
let currentSearch = "";

function render() {
  const main = document.getElementById("mainList");
  const empty = document.getElementById("emptyMsg");
  main.innerHTML = "";

  const filtered = PROMPTS.filter(p => {
    const matchCat = currentCat === "전체" || p.cat === currentCat;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || p.title.toLowerCase().includes(q) || p.prompt.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q) || p.ai.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  const cats = currentCat === "전체" ? catSections : [currentCat];
  cats.forEach(cat => {
    const items = filtered.filter(p => p.cat === cat);
    if (items.length === 0) return;

    const label = document.createElement("div");
    label.className = "section-label";
    label.textContent = catLabels[cat];
    main.appendChild(label);

    items.forEach((p, i) => {
      const id = `row-${p.idx.replace("/","-")}`;
      const row = document.createElement("div");
      row.className = "prompt-row";
      row.id = id;

      const color = catColors[p.cat] || "#6b7280";
      const tagStyle = `style="background:${color}18; color:${color}; border-color:${color}33;"`;

      row.innerHTML = `
        <div class="row-head" onclick="toggleRow('${id}')">
          <span class="row-idx">${p.idx}</span>
          <span class="row-title">${p.title}</span>
          <div class="row-right">
            <span class="tag" ${tagStyle}>${p.cat}</span>
            <span class="tag ai">${p.ai}</span>
            <span class="row-arrow">›</span>
          </div>
        </div>
        <div class="row-body">
          <p class="row-desc">${p.desc}</p>
          <div class="prompt-box">
            <div class="prompt-label">프롬프트</div>
            <div class="prompt-code" id="code-${id}">${escHtml(p.prompt)}</div>
            <div class="prompt-actions">
              <button class="copy-btn" onclick="copyPrompt('${id}')">📋 프롬프트 복사</button>
              <span class="copy-ok" id="ok-${id}">✓ 복사됐습니다!</span>
            </div>
          </div>
        </div>`;
      main.appendChild(row);
    });
  });
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toggleRow(id) {
  document.getElementById(id).classList.toggle("open");
}

function copyPrompt(id) {
  const el = document.getElementById("code-" + id);
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const ok = document.getElementById("ok-" + id);
    ok.style.display = "flex";
    setTimeout(() => { ok.style.display = "none"; }, 2000);
  }).catch(() => {
    const range = document.createRange();
    range.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand("copy");
    window.getSelection().removeAllRanges();
    const ok = document.getElementById("ok-" + id);
    ok.style.display = "flex";
    setTimeout(() => { ok.style.display = "none"; }, 2000);
  });
}

// 필터 탭
document.getElementById("filterTabs").addEventListener("click", e => {
  const tab = e.target.closest(".ftab");
  if (!tab) return;
  document.querySelectorAll(".ftab").forEach(t => t.classList.remove("on"));
  tab.classList.add("on");
  currentCat = tab.dataset.cat;
  render();
});

// 검색
let searchTimer;
document.getElementById("searchInput").addEventListener("input", e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = e.target.value.trim();
    render();
  }, 200);
});

render();
</script>
